name: Generate Tech Radar

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/generate-tech-radar.yml"
      - "scripts/generate_tech_radar.py"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate tech radar
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OUTPUT_FILE: assets/tech-radar.svg
          TOP_N: "10"
        run: python scripts/generate_tech_radar.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/tech-radar.svg

          if git diff --cached --quiet; then
            echo "No changes, skipping commit."
          else
            git commit -m "chore: update tech radar [skip ci]"
            git push
          fi
