name: Generate Tech Radar

on:
  schedule:
    - cron: "0 3 * * *"   # her gün 06:00 Türkiye (03:00 UTC)
  workflow_dispatch:        # Actions sekmesinden manuel tetikleme

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate radar.svg
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python generate_radar.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add radar.svg
          git diff --cached --quiet && echo "Değişiklik yok, atlanıyor." || \
            (git commit -m "chore: update tech radar [skip ci]" && git push)
